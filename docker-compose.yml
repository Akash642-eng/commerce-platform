services:
  postgres:
    image: postgres:15
    container_name: commerce-db
    environment:
      POSTGRES_USER: commerce
      POSTGRES_PASSWORD: commerce
      POSTGRES_DB: commerce_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"


  auth-service:
    build: ./backend/auth-service
    container_name: auth-service
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db
      JWT_SECRET: supersecretkey

  product-service:
    build: ./backend/product-service
    container_name: product-service
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db


  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "8003:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db  

  inventory-service:
    build: ./backend/inventory-service
    container_name: inventory-service
    ports:
      - "8004:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db     

  cart-service:
    build: ./backend/cart-service
    container_name: cart-service
    ports:
      - "8005:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db 

  order-service:
    build: ./backend/order-service
    container_name: order-service
    ports:
      - "8006:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq

  payment-service:
    build: ./backend/payment-service
    container_name: payment-service
    ports:
      - "8007:8000"
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db 
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq   

  delivery-service:
    build: ./backend/delivery-service
    container_name: delivery-service
    ports:
      - "8008:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db

  notification-service:
    build: ./backend/notification-service
    container_name: notification-service
    ports:
      - "8009:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db

  support-service:
    build: ./backend/support-service
    container_name: support-service
    ports:
      - "8010:8000"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://commerce:commerce@postgres:5432/commerce_db

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8000"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - inventory-service
      - cart-service
      - order-service
      - payment-service
      - delivery-service
      - notification-service
      - support-service

volumes:
  postgres_data: